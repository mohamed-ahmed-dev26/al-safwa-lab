<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Booking Page</title>
    <link rel="stylesheet" href="cssfolder/stylesheet.css" />
  </head>
  <body>
    <header>
      <h1>book a test</h1>
    </header>
    <nav>
      <a href="index.html" title="go to home page">home page</a>
    </nav>
    <section>
      <form action="#" method="post" novalidate autocomplete="on">
        <label for="fullname">full name</label>
        <input
          type="text"
          id="fullname"
          name="fullname"
          placeholder="enter full name"
          required
        />
        <br /><br />
        <label for="email">email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="enter email"
          required
        />
        <br /><br />
        <label for="number">phone number</label>
        <input
          type="number"
          id="number"
          name="number"
          placeholder="enter phone number"
          required
        />
        <br /><br />
        <select>
          <option>Blood Test</option>
          <option>Diabetes Test</option>
          <option>Vitamin Test</option>
          <option>Hormone Test</option>
        </select>
        <label for="booking">booking date</label>
        <input type="date" id="booking" name="booking" required />
        <br /><br />
        <label for="note">note</label>
        <br />
        <textarea
          id="note"
          name="note"
          cols="50"
          rows="20"
          placeholder="write note"
          required
        ></textarea>
        <br /><br />
        <input type="submit" name="submit" value="submit" required />
      </form>
    </section>
  </body>
</html>
